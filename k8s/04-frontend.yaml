apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: poc-teste
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/wanderms25/pda_nbr5419_frontend:1.0.7
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: pda-config
